<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" role="img" aria-label="Personal Coach – horizontal lockup">
  <title>Personal Coach – horizontal lockup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    .word { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.02em; fill: #0F1115; }
    .lg { font-size: 30px; }
    .sm { font-size: 13px; letter-spacing: 0.16em; fill: #FC4C02; font-weight: 600; }
  </style>
  <!-- Mark -->
  <rect x="0" y="8" width="64" height="64" rx="14" fill="#FC4C02"/>
  <g fill="#FFFFFF">
    <rect x="12"   y="48" width="9" height="14" rx="1.5"/>
    <rect x="23.5" y="40" width="9" height="22" rx="1.5"/>
    <rect x="35"   y="30" width="9" height="32" rx="1.5"/>
    <rect x="46.5" y="20" width="9" height="42" rx="1.5"/>
  </g>
  <!-- Wordmark -->
  <text class="word lg" x="84" y="44">PERSONAL</text>
  <text class="word lg" x="84" y="72">COACH</text>
</svg>
