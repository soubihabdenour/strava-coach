<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Personal Coach – social preview">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;600&amp;display=swap');
    .display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; fill: #FFFFFF; letter-spacing: -0.02em; }
    .ui      { font-family: 'Inter', sans-serif; fill: #C7CCD8; }
    .accent  { fill: #FC4C02; }
    .eyebrow { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; letter-spacing: 0.18em; text-transform: uppercase; fill: #FC4C02; }
  </style>

  <rect width="1200" height="630" fill="#0F1115"/>

  <!-- Background accent: faint ascending bars on right -->
  <g opacity="0.06" fill="#FC4C02">
    <rect x="740"  y="430" width="40" height="120" rx="6"/>
    <rect x="800"  y="370" width="40" height="180" rx="6"/>
    <rect x="860"  y="290" width="40" height="260" rx="6"/>
    <rect x="920"  y="220" width="40" height="330" rx="6"/>
    <rect x="980"  y="150" width="40" height="400" rx="6"/>
    <rect x="1040" y="80"  width="40" height="470" rx="6"/>
  </g>

  <!-- Brand mark + name -->
  <g transform="translate(80,72)">
    <rect width="64" height="64" rx="14" fill="#FC4C02"/>
    <g fill="#FFFFFF">
      <rect x="12"   y="40" width="9" height="14" rx="1.5"/>
      <rect x="23.5" y="32" width="9" height="22" rx="1.5"/>
      <rect x="35"   y="22" width="9" height="32" rx="1.5"/>
      <rect x="46.5" y="12" width="9" height="42" rx="1.5"/>
    </g>
    <text x="84" y="44" class="display" font-size="28">Personal Coach</text>
  </g>

  <!-- Headline -->
  <text x="80" y="310" class="eyebrow">For endurance athletes</text>
  <text x="80" y="380" class="display" font-size="84">Train smarter,</text>
  <text x="80" y="470" class="display" font-size="84"><tspan class="accent">not just harder.</tspan></text>

  <!-- Sub -->
  <text x="80" y="540" class="ui" font-size="24">AI-tailored plans · pace zones from your Strava · run, swim, bike, tri.</text>
</svg>
