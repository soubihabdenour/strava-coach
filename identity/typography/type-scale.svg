<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" role="img" aria-label="Personal Coach type scale">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600;700&amp;display=swap');
    .display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.02em; fill: #0F1115; }
    .ui      { font-family: 'Inter', sans-serif; fill: #0F1115; }
    .meta    { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px; fill: #8A93A6; letter-spacing: 0.08em; text-transform: uppercase; }
    .group   { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; fill: #5A6478; }
    .label   { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 12px; fill: #5A6478; }
  </style>
  <rect width="920" height="720" fill="#F4F5F8"/>
  <text x="40" y="48" class="display" font-size="28">Type Scale</text>

  <text x="40" y="92" class="group">Display family — Space Grotesk</text>
  <text x="40" y="160" class="display" font-size="56">Stride. Push. Recover.</text>
  <text x="40" y="180" class="label">56 / 1.15 / -0.02em — display</text>

  <text x="40" y="232" class="display" font-size="36">Build a training plan</text>
  <text x="40" y="250" class="label">36 / 1.2 / -0.02em — h1</text>

  <text x="40" y="298" class="display" font-size="22">Week 4 — Build phase</text>
  <text x="40" y="316" class="label">22 / 1.3 — h2</text>

  <text x="40" y="372" class="group">UI family — Inter</text>
  <text x="40" y="412" class="ui" font-size="18" font-weight="600">Tomorrow’s plan: recovery</text>
  <text x="40" y="430" class="label">18 / 1.3 / 600 — card title</text>

  <text x="40" y="472" class="ui" font-size="16">Long session today. Tomorrow: easy 30–40 min in zone 1–2, or full rest.</text>
  <text x="40" y="490" class="label">16 / 1.5 / 400 — body</text>

  <text x="40" y="532" class="ui" font-size="13" fill="#5A6478">starts 2026-06-01 · 5×1 km @ 4:35/km</text>
  <text x="40" y="550" class="label">13 / 1.5 / 400 — meta</text>

  <text x="40" y="588" class="ui" font-size="12" font-weight="600" letter-spacing="0.12em">4-WEEK DISTANCE</text>
  <text x="40" y="606" class="label">12 / uppercase / 0.12em — eyebrow</text>

  <text x="40" y="660" class="display" font-size="44">128.4 km</text>
  <text x="40" y="680" class="label">44 / 700 / tabular-nums — big stat (numeric)</text>
</svg>
